<svg viewBox="0 0 720 520" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,Helvetica,Arial,sans-serif">
<title>nTZS to USDC corridor on two settlement clocks</title>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5f6368" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
.teal{fill:#e6f4f0;stroke:#0b6b53;stroke-width:1}
.blue{fill:#e9eefb;stroke:#2a4d9b;stroke-width:1}
.gray{fill:#f1f2f4;stroke:#9aa0a6;stroke-width:1}
.box{fill:#f7f8f9;stroke:#c9ced4;stroke-width:1}
.t{font-size:13px;font-weight:500;fill:#202124}
.ts{font-size:11px;font-weight:400;fill:#5f6368}
.arr{stroke:#5f6368;stroke-width:1.4;fill:none}
.div{stroke:#bcc1c6;stroke-width:1;stroke-dasharray:4 4;fill:none}
</style>
</defs>

<text x="34" y="26" style="font-size:16px;font-weight:600;fill:#202124">nTZS &#8596; USDC corridor — two settlement clocks</text>
<text x="34" y="45" class="ts">On-chain swap settles in seconds; the regulated reserves net behind it.</text>

<line x1="385" y1="96" x2="385" y2="388" class="div"/>
<text x="246" y="84" text-anchor="middle" class="ts">Domestic &#183; BoT sandbox</text>
<text x="516" y="84" text-anchor="middle" class="ts">Offshore &#183; VASP</text>

<rect x="158" y="110" width="176" height="72" rx="8" class="teal"/><text x="246" y="142" text-anchor="middle" class="t">nTZS float</text><text x="246" y="161" text-anchor="middle" class="ts">on-chain TZS</text>
<rect x="436" y="110" width="160" height="72" rx="8" class="blue"/><text x="516" y="142" text-anchor="middle" class="t">USDC float</text><text x="516" y="161" text-anchor="middle" class="ts">on-chain USD</text>
<rect x="612" y="110" width="104" height="72" rx="8" class="gray"/><text x="664" y="142" text-anchor="middle" class="t">Foreign party</text><text x="664" y="161" text-anchor="middle" class="ts">sends/gets USDC</text>

<rect x="24" y="300" width="120" height="72" rx="8" class="gray"/><text x="84" y="332" text-anchor="middle" class="t">Customer</text><text x="84" y="351" text-anchor="middle" class="ts">pays / gets TZS</text>
<rect x="158" y="300" width="176" height="72" rx="8" class="teal"/><text x="246" y="332" text-anchor="middle" class="t">TZS trust / escrow</text><text x="246" y="351" text-anchor="middle" class="ts">ring-fenced reserves</text>
<rect x="436" y="300" width="160" height="72" rx="8" class="blue"/><text x="516" y="332" text-anchor="middle" class="t">USD nostro</text><text x="516" y="351" text-anchor="middle" class="ts">bank account</text>

<line x1="334" y1="146" x2="434" y2="146" class="arr" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
<text x="384" y="138" text-anchor="middle" class="ts">on-chain swap = settlement</text>
<line x1="334" y1="336" x2="434" y2="336" class="arr" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
<text x="384" y="328" text-anchor="middle" class="ts">bank FX &#183; net settle</text>

<line x1="246" y1="182" x2="246" y2="300" class="arr" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
<text x="254" y="245" class="ts">mint / burn 1:1</text>
<line x1="516" y1="182" x2="516" y2="300" class="arr" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
<text x="524" y="245" class="ts">mint / redeem 1:1</text>

<line x1="144" y1="336" x2="156" y2="336" class="arr" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
<line x1="610" y1="146" x2="598" y2="146" class="arr" marker-end="url(#arrow)" marker-start="url(#arrow)"/>

<line x1="246" y1="372" x2="246" y2="408" class="div"/>
<rect x="158" y="408" width="176" height="46" rx="8" class="box"/>
<text x="246" y="430" text-anchor="middle" class="t">Reserve dashboard</text>
<text x="246" y="447" text-anchor="middle" class="ts">TZS reserves = nTZS, live</text>

<rect x="24" y="472" width="12" height="12" rx="3" class="teal"/><text x="42" y="482" class="ts">Domestic — TZS / nTZS (sandbox)</text>
<rect x="350" y="472" width="12" height="12" rx="3" class="blue"/><text x="368" y="482" class="ts">Offshore — USD / USDC (VASP)</text>
<text x="24" y="504" class="ts">Arrows run both ways — outbound shown; reverse for inbound / redemption.</text>
</svg>
